<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
  </head>
  <body>
    <main class="main">
      <div class="calculator">
        <div class="calculation__display">
          <span class="calculations"
            >600<span class="calculation__display--action">/</span>2<span
              class="calculation__display--action"
              >+</span
            >3227<span class="calculation__display--action">*</span>2</span
          >
          <span class="calculation__result">=12,454</span>
        </div>

        <div class="calculator__buttons">
          <button type="button" class="calculator__btn calculator__btn--clear">
            Ac
          </button>
          <button type="button" class="calculator__btn calculator__btn--delete">
            ⌫
          </button>
          <button type="button" class="calculator__btn calculator__btn--divide">
            /
          </button>

          <button type="button" class="calculator__btn calculator__btn--multiply">
            *
          </button>
          <div class="buttons-right">
            <button
              type="button"
              class="calculator__btn calculator__btn--minus"
            >
              -
            </button>
            <button type="button" class="calculator__btn calculator__btn--plus">
              +
            </button>
            <button
              type="button"
              class="calculator__btn calculator__btn--equals"
            >
              =
            </button>
          </div>

          <button type="button" class="calculator__btn calculator__btn--seven">
            7
          </button>
          <button type="button" class="calculator__btn calculator__btn--eight">
            8
          </button>
          <button type="button" class="calculator__btn calculator__btn--nine">
            9
          </button>

          <button type="button" class="calculator__btn calculator__btn--four">
            4
          </button>
          <button type="button" class="calculator__btn calculator__btn--five">
            5
          </button>
          <button type="button" class="calculator__btn calculator__btn--six">
            6
          </button>

          <button type="button" class="calculator__btn calculator__btn--one">
            1
          </button>
          <button type="button" class="calculator__btn calculator__btn--two">
            2
          </button>
          <button type="button" class="calculator__btn calculator__btn--three">
            3
          </button>

          <button type="button" class="calculator__btn calculator__btn--zero">
            0
          </button>
          <button type="button" class="calculator__btn calculator__btn--dot">
            .
          </button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
